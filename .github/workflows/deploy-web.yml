name: Deploy web build to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Fetch compile-time deps
        run: ./tools/fetch-deps.sh

      - name: Build web bundle (TeaVM)
        run: ./gradlew :web:buildWeb --no-daemon

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/build/dist/webapp

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
